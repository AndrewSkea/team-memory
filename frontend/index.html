<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Team Memory</title>
  <link rel="stylesheet" href="./src/ui/main.css" />
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="header-icon">✳</div>
      <h1>Team Memory</h1>
      <p class="subtitle">Record what your team learns</p>
    </div>

    <nav class="nav-card" id="nav">
      <button class="nav-btn" data-page="remember">
        <svg viewBox="0 0 16 16"><path d="M3 2h10v12l-5-3-5 3V2z"/></svg>
        Remember
      </button>
      <button class="nav-btn" data-page="lookup">
        <svg viewBox="0 0 16 16"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg>
        Lookup
      </button>
      <button class="nav-btn" data-page="stats">
        <svg viewBox="0 0 16 16"><rect x="1" y="9" width="3" height="6" rx="1"/><rect x="6.5" y="5" width="3" height="10" rx="1"/><rect x="12" y="2" width="3" height="13" rx="1"/></svg>
        Stats
      </button>
      <button class="nav-btn" data-page="stale">
        <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6.5"/><polyline points="8 4.5 8 8 10.5 10"/></svg>
        Stale
      </button>
      <button class="nav-btn" data-page="meetings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Meetings
      </button>
      <button class="nav-btn" data-page="standup">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Standup
      </button>
      <button class="nav-btn" data-page="projects">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Projects
      </button>
      <button class="nav-btn" data-page="decisions">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Decisions
      </button>
      <button class="nav-btn" data-page="actions">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Actions
      </button>
      <button class="nav-btn" data-page="topics">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        Topics
      </button>
      <button class="nav-btn" data-page="timeline">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Timeline
      </button>
    </nav>

    <div id="root"></div>

    <footer class="footer" id="footer"></footer>
  </div>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
