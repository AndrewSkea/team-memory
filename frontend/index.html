<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Team Memory</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23c84e1a'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-size='20' fill='white'%3E✳%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="./src/ui/main.css" />
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="header-icon">✳</div>
      <h1>Team Memory</h1>
      <p class="subtitle">Record what your team learns</p>
    </div>

    <nav class="nav-card" id="nav">
      <button class="nav-btn" data-page="remember">
        <svg viewBox="0 0 16 16"><path d="M3 2h10v12l-5-3-5 3V2z"/></svg>
        Remember
      </button>
      <button class="nav-btn" data-page="lookup">
        <svg viewBox="0 0 16 16"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg>
        Lookup
      </button>
      <button class="nav-btn" data-page="stats">
        <svg viewBox="0 0 16 16"><rect x="1" y="9" width="3" height="6" rx="1"/><rect x="6.5" y="5" width="3" height="10" rx="1"/><rect x="12" y="2" width="3" height="13" rx="1"/></svg>
        Stats
      </button>
      <button class="nav-btn" data-page="meetings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Meetings
      </button>
    </nav>

    <div id="root"></div>

    <footer class="footer" id="footer"></footer>
  </div>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
